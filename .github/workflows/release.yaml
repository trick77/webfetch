name: Release

on:
  push:
    branches: [master]
    # Only cut a release for changes that affect the module itself; docs-only or
    # CI-only commits do not mint a new version.
    paths:
      - "**.go"
      - "go.mod"
      - "go.sum"
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump"
        type: choice
        options: [patch, minor, major]
        default: patch

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"
          cache-dependency-path: go.sum

      # A Go module tag is only useful if the tagged commit builds, so gate the
      # tag on build. Tests already ran on the PR into master (CI does not
      # re-test on the master push), so the release does not re-run them.
      - name: Build
        run: go build ./...

      - id: ver
        name: Compute next version
        run: |
          BUMP="${{ github.event.inputs.bump || 'patch' }}"
          LATEST=$(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | head -n1)
          LATEST="${LATEST#v}"
          LATEST="${LATEST:-0.0.0}"
          IFS=. read -r MA MI PA <<< "$LATEST"
          case "$BUMP" in
            major) MA=$((MA+1)); MI=0; PA=0 ;;
            minor) MI=$((MI+1)); PA=0 ;;
            patch) PA=$((PA+1)) ;;
          esac
          # Go modules require the leading "v" on version tags.
          NEXT="v$MA.$MI.$PA"
          echo "version=$NEXT" >> "$GITHUB_OUTPUT"
          echo "Bumping v$LATEST -> $NEXT ($BUMP)" >> "$GITHUB_STEP_SUMMARY"

      # Tag only AFTER build + tests pass, so a failed release never leaves an
      # orphan git tag behind.
      - name: Create and push tag
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.ver.outputs.version }}"
          git push origin "${{ steps.ver.outputs.version }}"
